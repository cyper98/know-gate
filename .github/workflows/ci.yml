name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # === Backend: lint + type check ===
  backend-lint:
    name: Backend - Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  # === Backend: tests (no DB required) ===
  backend-test:
    name: Backend - Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install minimal deps for test (full pyproject.toml in dev)
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install fastapi[standard] pydantic pydantic-settings structlog prometheus-client httpx pytest pytest-asyncio pytest-cov

      - name: Run tests
        env:
          # 32-byte base64 test key (decodes to 32 bytes)
          KG_ENCRYPTION_KEY: AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
          DB_HOST: localhost
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: test
        run: |
          pytest tests/test_health.py -v

  # === Frontend: lint + type check ===
  frontend-lint:
    name: Frontend - Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run eslint
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Run prettier check
        run: npm run format:check

  # === Frontend: build ===
  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

  # === Docker: validate compose ===
  docker-validate:
    name: Docker - Validate Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy .env for validation
        run: |
          cat > .env <<'EOF'
          DB_USER=test
          DB_PASSWORD=test
          DB_NAME=test
          MINIO_ROOT_USER=test
          MINIO_ROOT_PASSWORD=test
          KG_ENCRYPTION_KEY=dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0Lg==
          EOF

      - name: Validate docker-compose (base)
        run: docker compose -f deploy/docker-compose.yml config --quiet

      - name: Validate docker-compose (with dev overlay)
        run: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev.yml config --quiet

  # === Summary ===
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-test
      - frontend-lint
      - frontend-build
      - docker-validate
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.backend-lint.result }}" != "success" ] || \
             [ "${{ needs.backend-test.result }}" != "success" ] || \
             [ "${{ needs.frontend-lint.result }}" != "success" ] || \
             [ "${{ needs.frontend-build.result }}" != "success" ] || \
             [ "${{ needs.docker-validate.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed ✓"
