{{- /*
============================================================================
Sealed Secrets example for KnowGate.

This template produces no Kubernetes resources. It is documentation only.
Helm will treat the rendered output as a comment block.

To activate Sealed Secrets in your deployment:

  1. Install the Sealed Secrets controller:
       helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
       helm install sealed-secrets sealed-secrets/sealed-secrets -n kube-system

  2. Install kubeseal CLI: https://github.com/bitnami-labs/sealed-secrets

  3. Create the raw Secret manifest locally (sealed-secret.yaml) with all
     keys listed below. Do NOT commit the raw file.

  4. Encrypt it:
       kubeseal --format yaml < sealed-secret.yaml > sealed-secret.encrypted.yaml

  5. Replace the placeholder below with the encrypted content and rename
     this file to `sealed-secrets.yaml` (remove the `.example` suffix).
     Commit the encrypted file.

Expected keys inside the Kubernetes Secret named "knowgate-secrets":

  - OPENAI_API_KEY
  - ANTHROPIC_API_KEY
  - GOOGLE_OAUTH_CLIENT_ID
  - GOOGLE_OAUTH_CLIENT_SECRET
  - NOTION_API_KEY
  - SMTP_PASSWORD
  - JWT_PRIVATE_KEY
  - JWT_PUBLIC_KEY
  - ENCRYPTION_KEY
  - DB_HOST
  - DB_PORT
  - DB_USER
  - DB_PASSWORD
  - DB_NAME
  - REDIS_PASSWORD
  - MINIO_ROOT_USER
  - MINIO_ROOT_PASSWORD

Example SealedSecret manifest (uncomment and replace placeholders):

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: knowgate-secrets
  namespace: RELEASE-NAMESPACE
  labels:
    app.kubernetes.io/name: knowgate
    app.kubernetes.io/part-of: knowgate
spec:
  encryptedData:
    OPENAI_API_KEY: AgBy3i... (encrypted)
    DB_PASSWORD: AgBy3i... (encrypted)
  template:
    metadata:
      name: knowgate-secrets
      namespace: RELEASE-NAMESPACE
    type: Opaque
============================================================================
*/ -}}
