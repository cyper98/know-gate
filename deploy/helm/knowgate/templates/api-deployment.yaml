{{- if .Values.api.enabled -}}
{{- $component := "api" -}}
{{- $top := . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "knowgate.fullname" $ }}-{{ $component }}
  labels:
    {{- include "knowgate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  {{- if not .Values.api.hpa.enabled }}
  replicas: {{ .Values.api.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "knowgate.componentSelectorLabels" (list $ $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "knowgate.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      {{- include "knowgate.imagePullSecrets" $ | nindent 6 }}
      serviceAccountName: {{ include "knowgate.serviceAccountName" $ }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        {{- if .Values.api.initMigrate.enabled }}
        - name: migrate
          image: {{ include "knowgate.image" (dict "image" .Values.api.image "Chart" .Chart) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - sh
            - -c
            - "alembic upgrade head"
          env:
            {{- include "knowgate.commonEnv" (dict "Values" .Values "component" $component "Chart" .Chart "Release" .Release) | nindent 12 }}
          envFrom:
            {{- include "knowgate.secretEnvFrom" $ | nindent 12 }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        {{- end }}
        {{- if .Values.api.initSeed.enabled }}
        - name: seed
          image: {{ include "knowgate.image" (dict "image" .Values.api.image "Chart" .Chart) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - sh
            - -c
            - "python -m scripts.init || true"
          env:
            {{- include "knowgate.commonEnv" (dict "Values" .Values "component" $component "Chart" .Chart "Release" .Release) | nindent 12 }}
          envFrom:
            {{- include "knowgate.secretEnvFrom" $ | nindent 12 }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        {{- end }}
      containers:
        - name: api
          image: {{ include "knowgate.image" (dict "image" .Values.api.image "Chart" .Chart) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - uvicorn
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --proxy-headers
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- include "knowgate.commonEnv" (dict "Values" .Values "component" $component "Chart" .Chart "Release" .Release) | nindent 12 }}
          envFrom:
            {{- include "knowgate.secretEnvFrom" $ | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "knowgate.fullname" $ }}-{{ $component }}
  labels:
    {{- include "knowgate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "knowgate.componentSelectorLabels" (list $ $component) | nindent 4 }}
{{- if .Values.api.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "knowgate.fullname" $ }}-{{ $component }}
  labels:
    {{- include "knowgate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "knowgate.fullname" $ }}-{{ $component }}
  minReplicas: {{ .Values.api.hpa.minReplicas }}
  maxReplicas: {{ .Values.api.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.hpa.targetCPUUtilizationPercentage }}
{{- end }}
{{- if .Values.api.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "knowgate.fullname" $ }}-{{ $component }}
  labels:
    {{- include "knowgate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  minAvailable: {{ .Values.api.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "knowgate.componentSelectorLabels" (list $ $component) | nindent 6 }}
{{- end }}
{{- end }}
