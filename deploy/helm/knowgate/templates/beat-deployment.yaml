{{- if .Values.beat.enabled -}}
{{- $component := "beat" -}}
{{- $top := . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "knowgate.fullname" $ }}-{{ $component }}
  labels:
    {{- include "knowgate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: {{ .Values.beat.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "knowgate.componentSelectorLabels" (list $ $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "knowgate.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      {{- include "knowgate.imagePullSecrets" $ | nindent 6 }}
      serviceAccountName: {{ include "knowgate.serviceAccountName" $ }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: beat
          image: {{ include "knowgate.image" (dict "image" .Values.beat.image "Chart" .Chart) }}
          imagePullPolicy: {{ .Values.beat.image.pullPolicy }}
          command:
            - celery
            - -A
            - app.celery_app
            - beat
            - --loglevel=INFO
            - --schedule=/tmp/celerybeat-schedule
            {{- if .Values.beat.leaderElection }}
            - --leader-election
            {{- end }}
          env:
            {{- include "knowgate.commonEnv" (dict "Values" .Values "component" $component "Chart" .Chart "Release" .Release) | nindent 12 }}
          envFrom:
            {{- include "knowgate.secretEnvFrom" $ | nindent 12 }}
          {{- if .Values.beat.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "celery -A app.celery_app inspect ping -t 5 || exit 1"
            initialDelaySeconds: {{ .Values.beat.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.beat.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.beat.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.beat.livenessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.beat.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
