{{- if .Values.worker.enabled -}}
{{- $component := "worker" -}}
{{- $top := . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "knowgate.fullname" $ }}-{{ $component }}
  labels:
    {{- include "knowgate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  {{- if not .Values.worker.hpa.enabled }}
  replicas: {{ .Values.worker.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "knowgate.componentSelectorLabels" (list $ $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "knowgate.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "9090"
    spec:
      {{- include "knowgate.imagePullSecrets" $ | nindent 6 }}
      serviceAccountName: {{ include "knowgate.serviceAccountName" $ }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: {{ include "knowgate.image" (dict "image" .Values.worker.image "Chart" .Chart) }}
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command:
            - celery
            - -A
            - app.worker.celery_app
            - worker
            - --loglevel=INFO
            - --concurrency={{ .Values.worker.concurrency | default 2 }}
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            {{- include "knowgate.commonEnv" (dict "Values" .Values "component" $component "Chart" .Chart "Release" .Release) | nindent 12 }}
          envFrom:
            {{- include "knowgate.secretEnvFrom" $ | nindent 12 }}
          {{- if .Values.worker.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "celery -A app.worker.celery_app inspect ping -t 5 || exit 1"
            initialDelaySeconds: {{ .Values.worker.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.livenessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- if .Values.worker.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "knowgate.fullname" $ }}-{{ $component }}
  labels:
    {{- include "knowgate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "knowgate.fullname" $ }}-{{ $component }}
  minReplicas: {{ .Values.worker.hpa.minReplicas }}
  maxReplicas: {{ .Values.worker.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.hpa.targetCPUUtilizationPercentage }}
{{- end }}
{{- if .Values.worker.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "knowgate.fullname" $ }}-{{ $component }}
  labels:
    {{- include "knowgate.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  minAvailable: {{ .Values.worker.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "knowgate.componentSelectorLabels" (list $ $component) | nindent 6 }}
{{- end }}
{{- end }}
