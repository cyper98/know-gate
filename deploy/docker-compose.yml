name: knowgate

# KnowGate MVP - Docker Compose (dev + single-host self-host)
# All config via env (.env). No hardcoded values, no fallbacks.

services:
  # === PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: kg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [kg-net]

  # === Redis (cache + Celery broker) ===
  redis:
    image: redis:7-alpine
    container_name: kg-redis
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then \
        redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes; \
      else \
        redis-server --appendonly yes; \
      fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [kg-net]

  # === Qdrant (vector store) ===
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: kg-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [kg-net]

  # === MinIO (S3-compatible object storage) ===
  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    container_name: kg-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [kg-net]

  # === MailHog (dev SMTP - catches all emails) ===
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: kg-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks: [kg-net]

  # === LiteLLM (LLM gateway) ===
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: kg-litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-dev-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [kg-net]

  # === Init container (runs migrations + seed) ===
  init:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kg-init
    restart: "no"
    command: ["sh", "-c", "echo 'Init container placeholder. Real init added in Phase 02 (migrations + seed).'"]
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [kg-net]

  # === API (FastAPI) ===
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kg-api
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../secrets:/app/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      litellm:
        condition: service_started
    networks: [kg-net]

  # === Celery Worker (sync, embedding, indexing) ===
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kg-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    env_file: ../.env
    volumes:
      - ../secrets:/app/secrets:ro
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [kg-net]

  # === Celery Beat (scheduler) ===
  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kg-beat
    restart: unless-stopped
    command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=INFO"]
    env_file: ../.env
    volumes:
      - ../secrets:/app/secrets:ro
    depends_on:
      redis:
        condition: service_healthy
    networks: [kg-net]

  # === Frontend (Next.js) ===
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: kg-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL required}
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    networks: [kg-net]

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:

networks:
  kg-net:
    driver: bridge
