# A generic, single database configuration for KnowGate migrations.

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path for imports (project root is one level up)
prepend_sys_path = .

# Timezone for migration timestamps (UTC)
timezone = UTC

# Truncate slugs to this length
truncate_slug_length = 40

# Set in env.py from app config
# sqlalchemy.url = driver://user:pass@host/dbname

[post_write_hooks]
# (none for now — add ruff format if needed)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
